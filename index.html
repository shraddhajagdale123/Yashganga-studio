<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>YASHGANGA PHOTO'S STUDIO | Premium Photography</title>
    <!-- Google Fonts + Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            overflow-x: hidden;
        }
        /* Fullscreen hero background */
        .fullscreen-hero {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
        }
        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('Images/BG.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transform: scale(1);
            animation: subtleZoom 20s ease-in-out infinite alternate;
        }
        @keyframes subtleZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.08); }
        }
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.4) 100%);
        }
        .hero-content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            color: white;
            padding: 0 20px;
        }
        .hero-content h1 {
            font-size: 4.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            animation: fadeInUp 1s ease;
            letter-spacing: -1px;
        }
        .hero-content p {
            font-size: 1.3rem;
            max-width: 600px;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease 0.2s backwards;
            opacity: 0.9;
        }
        .hero-buttons {
            animation: fadeInUp 1s ease 0.4s backwards;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .btn-primary {
            background: #c49a6c;
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0 10px;
        }
        .btn-primary:hover {
            background: #a67c52;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .btn-outline-light {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 14px 40px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-outline-light:hover {
            background: white;
            color: #1e1e1e;
            transform: translateY(-2px);
        }
        /* Navbar floating */
        .navbar-floating {
            position: fixed;
            top: 20px;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            margin-left: auto;
            margin-right: auto;
            width: calc(100% - 80px);
            height: 70px;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            letter-spacing: -1px;
        }
        .logo span { color: #c49a6c; }
        .nav-links {
            display: flex;
            gap: 30px;
            list-style: none;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }
        .nav-links a:hover { color: #c49a6c; }
        .owner-badge-btn {
            background: rgba(196,154,108,0.2);
            border: 1px solid #c49a6c;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }
        .owner-badge-btn:hover { background: #c49a6c; }
        /* Content sections */
        .section {
            padding: 100px 5%;
            background: #fefcf8;
        }
        .section-dark {
            background: #1a1a1a;
            color: white;
        }
        .container {
            max-width: 1280px;
            margin: 0 auto;
        }
        .section-title {
            text-align: center;
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .section-subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 60px;
            font-size: 1.1rem;
        }
        
        /* Owner Section Styles */
        .owner-section {
            background: linear-gradient(135deg, #fff9f0 0%, #ffffff 100%);
            padding: 80px 5%;
        }
        .owner-container {
            display: flex;
            align-items: center;
            gap: 60px;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
        }
        .owner-image {
            flex: 1;
            min-width: 280px;
            position: relative;
        }
        .owner-image img {
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.15);
            object-fit: cover;
            aspect-ratio: 1 / 1;
            transition: transform 0.3s;
        }
        .owner-image img:hover {
            transform: scale(1.02);
        }
        .owner-info {
            flex: 1.5;
        }
        .owner-info h2 {
            font-size: 2.5rem;
            color: #2c3e2f;
            margin-bottom: 10px;
        }
        .owner-title {
            font-size: 1.2rem;
            color: #c49a6c;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .owner-description {
            font-size: 1.1rem;
            line-height: 1.7;
            color: #4a4a4a;
            margin-bottom: 25px;
        }
        .owner-signature {
            font-family: 'Georgia', serif;
            font-size: 1.3rem;
            color: #c49a6c;
            margin-top: 20px;
            font-style: italic;
        }
        .edit-owner-btn {
            margin-top: 20px;
            background: #c49a6c;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-right: 10px;
        }
        .edit-owner-btn:hover {
            background: #a67c52;
            transform: translateY(-2px);
        }
        .upload-photo-btn {
            background: #2c3e2f;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .upload-photo-btn:hover {
            background: #1e2a1f;
            transform: translateY(-2px);
        }
        .file-input-hidden {
            display: none;
        }
        
        /* Services Grid */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .service-card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }
        .service-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .service-icon { font-size: 3rem; color: #c49a6c; margin-bottom: 20px; }
        .price { font-size: 1.8rem; font-weight: 800; color: #c49a6c; margin-top: 15px; }
        .edit-delete-btns {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            gap: 8px;
        }
        .edit-btn, .delete-btn {
            background: rgba(0,0,0,0.6);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
        }
        .edit-btn:hover { background: #c49a6c; }
        .delete-btn:hover { background: #dc3545; }
        /* Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }
        .gallery-item {
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .gallery-img {
            height: 320px;
            background-size: cover;
            background-position: center;
            transition: transform 0.5s;
        }
        .gallery-item:hover .gallery-img { transform: scale(1.05); }
        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            padding: 20px;
            color: white;
        }
        /* Owner Panel */
        .owner-panel {
            background: #2c2c2c;
            color: white;
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 999;
            display: none;
        }
        .owner-panel .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        /* Forms */
        .inquiry-section {
            background: white;
            border-radius: 32px;
            padding: 40px;
            margin-top: 40px;
        }
        .inquiry-form input, .inquiry-form select, .inquiry-form textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 60px;
            font-family: inherit;
        }
        .inquiry-form textarea { border-radius: 24px; resize: vertical; }
        .inquiry-list {
            background: #f9f9f9;
            border-radius: 24px;
            padding: 20px;
            margin-top: 40px;
            max-height: 500px;
            overflow-y: auto;
        }
        .inquiry-card {
            background: white;
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #c49a6c;
        }
        .add-service-form {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .add-service-form input {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            border: 1px solid #ddd;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 32px;
            width: 90%;
            max-width: 450px;
        }
        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.5rem; }
            .navbar-floating { padding: 0 20px; width: calc(100% - 40px); }
            .nav-links { display: none; }
            .section-title { font-size: 2rem; }
            .owner-container { flex-direction: column; text-align: center; gap: 30px; }
            .owner-image img { max-width: 280px; margin: 0 auto; display: block; }
        }
        footer {
            background: #0a0a0a;
            color: #aaa;
            padding: 60px 5% 30px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        // ========== DATA STORAGE ==========
        // Owner Profile Data
        let ownerProfile = {
            name: "Ruturaj Ghadage",
            title: "Founder & Photographer",
            imageUrl: "Images/Owner.jpeg",
            description: "आजचा आनंद,उद्याची आठवण आणि ती आठवण जपण्यासाठी योग्य ठिकाण म्हणजे आमचा फोटो स्टुडिओ",
            signature: "Capturing light, revealing souls."
        };
        
        let servicesData = [
            { id: 1, name: "Portrait Sessions", description: "Professional headshots & personal branding",  icon: "fas fa-camera-retro" },
            { id: 2, name: "Fashion Editorial", description: "High fashion lookbooks & editorial",  icon: "fas fa-tshirt" },
            { id: 3, name: "Commercial", description: "Product & corporate photography",  icon: "fas fa-building" },
            { id: 4, name: "Events & Weddings", description: "Full event coverage & storytelling", icon: "fas fa-calendar-alt" }
        ];
        
        let inquiriesData = [];
        
        // Load from localStorage
        try {
            const savedOwner = localStorage.getItem('lumina_owner');
            if (savedOwner) ownerProfile = JSON.parse(savedOwner);
            const savedServices = localStorage.getItem('lumina_services');
            if (savedServices) servicesData = JSON.parse(savedServices);
            const savedInquiries = localStorage.getItem('lumina_inquiries');
            if (savedInquiries) inquiriesData = JSON.parse(savedInquiries);
        } catch(e) {}
        
        function saveOwner() { localStorage.setItem('lumina_owner', JSON.stringify(ownerProfile)); }
        function saveServices() { localStorage.setItem('lumina_services', JSON.stringify(servicesData)); }
        function saveInquiries() { localStorage.setItem('lumina_inquiries', JSON.stringify(inquiriesData)); }
        
        // Gallery images (stunning collection)
        const galleryImages = [
            { id: 1, title: "Kids Photography", category: "Portrait", url: "Images/kids2.jpeg" },
            { id: 2, title: "Outdoor Photography ", category: "Fashion", url: "Images/outdoor.jpeg" },
            { id: 3, title: "Studio Photography", category: "Commercial", url: "Images/studio.jpeg" },
            { id: 4, title: "Maternity Photography", category: "Events", url: "Images/maternity.jpeg" },
            { id: 5, title: "Pre-Wedding Photography", category: "Fashion", url: "Images/pre-wed.jpeg" },
            { id: 6, title: "Wedding Vibes", category: "Portrait", url: "Images/wedding.jpeg" }
        ];
        
        // React App Component
        const App = () => {
            const [isOwner, setIsOwner] = React.useState(false);
            const [showLoginModal, setShowLoginModal] = React.useState(false);
            const [services, setServices] = React.useState(servicesData);
            const [inquiries, setInquiries] = React.useState(inquiriesData);
            const [owner, setOwner] = React.useState(ownerProfile);
            
            // Refresh data
            const refreshData = () => {
                setServices([...servicesData]);
                setInquiries([...inquiriesData]);
                setOwner({...ownerProfile});
            };
            
            // Owner Functions
            const handleLogin = (password) => {
                if (password === 'studio123') {
                    setIsOwner(true);
                    setShowLoginModal(false);
                    showToast('Welcome Owner! You can now manage services, owner profile, and inquiries.', '#c49a6c');
                } else {
                    showToast('Incorrect password.', '#dc3545');
                }
            };
            
            const handleLogout = () => {
                setIsOwner(false);
                showToast('Logged out from owner mode', '#c49a6c');
            };
            
            // Convert image file to base64
            const handleImageUpload = (event) => {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const base64Image = e.target.result;
                        ownerProfile.imageUrl = base64Image;
                        saveOwner();
                        setOwner({...ownerProfile});
                        showToast('Owner photo updated successfully!', '#28a745');
                    };
                    reader.readAsDataURL(file);
                }
            };
            
            // Update Owner Profile (text fields only)
            const updateOwnerProfile = (newName, newTitle, newDescription, newSignature) => {
                if (newName) ownerProfile.name = newName;
                if (newTitle) ownerProfile.title = newTitle;
                if (newDescription) ownerProfile.description = newDescription;
                if (newSignature) ownerProfile.signature = newSignature;
                saveOwner();
                setOwner({...ownerProfile});
                showToast('Owner profile updated!', '#28a745');
            };
            
            const addService = (name, description, price) => {
                if (!name.trim()) return false;
                const newService = {
                    id: Date.now(),
                    name: name.trim(),
                    description: description.trim() || "New service",
                    price: price.trim() || "Contact us",
                    icon: "fas fa-camera"
                };
                servicesData.push(newService);
                saveServices();
                setServices([...servicesData]);
                showToast('Service added successfully!', '#28a745');
                return true;
            };
            
            const editService = (id, newName, newDesc, newPrice) => {
                const service = servicesData.find(s => s.id === id);
                if (service) {
                    if (newName) service.name = newName;
                    if (newDesc) service.description = newDesc;
                    if (newPrice) service.price = newPrice;
                    saveServices();
                    setServices([...servicesData]);
                    showToast('Service updated', '#c49a6c');
                }
            };
            
            const deleteService = (id) => {
                if (confirm('Delete this service permanently?')) {
                    servicesData = servicesData.filter(s => s.id !== id);
                    saveServices();
                    setServices([...servicesData]);
                    showToast('Service removed', '#dc3545');
                }
            };
            
            const addInquiry = (name, email, type, message) => {
                if (!name || !message) return false;
                const newInquiry = {
                    id: Date.now(),
                    name: name.trim(),
                    email: email.trim(),
                    type: type,
                    message: message.trim(),
                    date: new Date().toLocaleString()
                };
                inquiriesData.unshift(newInquiry);
                saveInquiries();
                setInquiries([...inquiriesData]);
                showToast('Message sent! We\'ll respond within 24h.', '#28a745');
                return true;
            };
            
            const deleteInquiry = (id) => {
                inquiriesData = inquiriesData.filter(i => i.id !== id);
                saveInquiries();
                setInquiries([...inquiriesData]);
                showToast('Inquiry removed', '#dc3545');
            };
            
            const showToast = (msg, bgColor) => {
                const toast = document.getElementById('customToast');
                if (toast) {
                    toast.textContent = msg;
                    toast.style.backgroundColor = bgColor;
                    toast.style.opacity = '1';
                    setTimeout(() => toast.style.opacity = '0', 3000);
                }
            };
            
            const scrollToSection = (id) => {
                const element = document.getElementById(id);
                if (element) element.scrollIntoView({ behavior: 'smooth' });
            };
            
            return (
                <div>
                    <div id="customToast" style={{position: 'fixed', bottom: '30px', right: '30px', padding: '12px 24px', borderRadius: '50px', color: 'white', zIndex: 9999, opacity: 0, transition: '0.3s', pointerEvents: 'none', fontFamily: 'Inter' }}></div>
                    
                    {/* Owner Panel */}
                    {isOwner && (
                        <div className="owner-panel" style={{display: 'block'}}>
                            <div className="container">
                                <div><i className="fas fa-crown"></i> <strong>Owner Mode Active</strong> - You can manage owner profile, services & inquiries</div>
                                <div>
                                    <button onClick={() => scrollToSection('owner-section')} className="btn-primary" style={{background: '#c49a6c', padding: '8px 20px', marginRight: '10px'}}>Edit Profile</button>
                                    <button onClick={() => scrollToSection('owner-inquiries')} className="btn-primary" style={{background: '#c49a6c', padding: '8px 20px', marginRight: '10px'}}>View Inquiries ({inquiries.length})</button>
                                    <button onClick={handleLogout} style={{background: '#555', padding: '8px 20px', borderRadius: '40px', border: 'none', color: 'white', cursor: 'pointer'}}>Logout</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* Floating Navbar */}
                    <div className="navbar-floating">
                        <div className="logo">YASHGANGA<span> PHOTOS</span></div>
                        <ul className="nav-links">
                            <li><a href="#" onClick={(e) => { e.preventDefault(); scrollToSection('owner-section'); }}>About</a></li>
                            <li><a href="#" onClick={(e) => { e.preventDefault(); scrollToSection('services'); }}>Services</a></li>
                            <li><a href="#" onClick={(e) => { e.preventDefault(); scrollToSection('gallery'); }}>Portfolio</a></li>
                            <li><a href="#" onClick={(e) => { e.preventDefault(); scrollToSection('pricing'); }}>Pricing</a></li>
                            <li><a href="#" onClick={(e) => { e.preventDefault(); scrollToSection('inquiry'); }}>Contact</a></li>
                        </ul>
                        <div className="owner-badge-btn" onClick={() => setShowLoginModal(true)}>
                            <i className="fas fa-key"></i> Owner
                        </div>
                    </div>
                    
                    {/* FULLSCREEN HERO SECTION */}
                    <div className="fullscreen-hero">
                        <div className="hero-background"></div>
                        <div className="hero-overlay"></div>
                        <div className="hero-content">
                            <h1>Where Moments<br />Become Timeless Art</h1>
                            <p>क्षण थांबवायचे असतात… आठवणी जपायच्या असतात…यशगंगा फोटोज स्टुडिओ  – तुमच्या खास क्षणांचे सुंदर चित्र!👰🤵 लग्न, 📸 पोर्ट्रेट, 👶 बेबी शूट, 🎉 कार्यक्रम… सगळं एकाच ठिकाणी!</p>
                            <div className="hero-buttons">
                                <button className="btn-primary" onClick={() => scrollToSection('services')}>Explore Services</button>
                                <button className="btn-outline-light" onClick={() => scrollToSection('gallery')}>View Portfolio</button>
                            </div>
                        </div>
                    </div>
                    
                    {/* OWNER SECTION - Meet the Photographer */}
                    <div id="owner-section" className="owner-section">
                        <div className="owner-container">
                            <div className="owner-image">
                                <img src={owner.imageUrl} alt={owner.name} />
                                {isOwner && (
                                    <>
                                        <input 
                                            type="file" 
                                            id="photoUpload" 
                                            accept="image/*" 
                                            style={{display: 'none'}}
                                            onChange={handleImageUpload}
                                        />
                                        <button className="upload-photo-btn" onClick={() => document.getElementById('photoUpload').click()}>
                                            <i className="fas fa-upload"></i> Upload New Photo
                                        </button>
                                    </>
                                )}
                            </div>
                            <div className="owner-info">
                                <h2>{owner.name}</h2>
                                <div className="owner-title">{owner.title}</div>
                                <div className="owner-description">{owner.description}</div>
                                <div className="owner-signature">✨ "{owner.signature}"</div>
                                {isOwner && (
                                    <button className="edit-owner-btn" onClick={() => {
                                        const newName = prompt("Edit owner name:", owner.name);
                                        const newTitle = prompt("Edit title:", owner.title);
                                        const newDesc = prompt("Edit description:", owner.description);
                                        const newSig = prompt("Edit signature quote:", owner.signature);
                                        updateOwnerProfile(newName, newTitle, newDesc, newSig);
                                    }}>
                                        <i className="fas fa-edit"></i> Edit Profile Info
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                    
                    {/* Services Section */}
                    <div id="services" className="section">
                        <div className="container">
                            <h2 className="section-title">Our Creative Services</h2>
                            <p className="section-subtitle">Tailored photography experiences for every moment</p>
                            <div className="services-grid">
                                {services.map(service => (
                                    <div className="service-card" key={service.id}>
                                        {isOwner && (
                                            <div className="edit-delete-btns">
                                                <button className="edit-btn" onClick={() => {
                                                    const newName = prompt("Edit service name:", service.name);
                                                    const newDesc = prompt("Edit description:", service.description);
                                                    const newPrice = prompt("Edit price:", service.price);
                                                    if(newName) editService(service.id, newName, newDesc, newPrice);
                                                }}><i className="fas fa-edit"></i></button>
                                                <button className="delete-btn" onClick={() => deleteService(service.id)}><i className="fas fa-trash"></i></button>
                                            </div>
                                        )}
                                        <div className="service-icon"><i className={service.icon}></i></div>
                                        <h3>{service.name}</h3>
                                        <p>{service.description}</p>
                                        <div className="price">{service.price}</div>
                                    </div>
                                ))}
                            </div>
                            {isOwner && (
                                <div className="add-service-form">
                                    <input type="text" id="newName" placeholder="Service name" />
                                    <input type="text" id="newDesc" placeholder="Description" />
                                    <input type="text" id="newPrice" placeholder="Price (e.g., $399)" />
                                    <button className="btn-primary" onClick={() => {
                                        const name = document.getElementById('newName').value;
                                        const desc = document.getElementById('newDesc').value;
                                        const price = document.getElementById('newPrice').value;
                                        if(addService(name, desc, price)) {
                                            document.getElementById('newName').value = '';
                                            document.getElementById('newDesc').value = '';
                                            document.getElementById('newPrice').value = '';
                                        }
                                    }}>+ Add New Service</button>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    {/* Gallery Section */}
                    <div id="gallery" className="section section-dark">
                        <div className="container">
                            <h2 className="section-title" style={{color: 'white'}}>✨ Demo of Our Work</h2>
                            <p className="section-subtitle" style={{color: '#aaa'}}>Real projects — stunning results</p>
                            <div className="gallery-grid">
                                {galleryImages.map(img => (
                                    <div className="gallery-item" key={img.id}>
                                        <div className="gallery-img" style={{backgroundImage: `url(${img.url})`}}></div>
                                        <div className="gallery-overlay">
                                            <h4>{img.title}</h4>
                                            <p>{img.category}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    
                    {/* Pricing Packages */}
                    <div id="pricing" className="section">
                        <div className="container">
                            <h2 className="section-title">Investment Packages</h2>
                            <p className="section-subtitle">Choose the perfect plan for your vision</p>
                            <div className="services-grid">
                                <div className="service-card"><h3>Essentials</h3><p>1 hour session · 15 edited images · Online gallery</p><button className="btn-primary" style={{marginTop: '20px'}} onClick={() => scrollToSection('inquiry')}>Inquire</button></div>
                                <div className="service-card" style={{border: '2px solid #c49a6c'}}><h3>Signature ⭐</h3><p>2.5 hour session · 40+ images · Two categories · Print release</p><button className="btn-primary" style={{marginTop: '20px'}} onClick={() => scrollToSection('inquiry')}>Most Popular</button></div>
                                <div className="service-card"><h3>Premium Event</h3><p>Full day coverage · 200+ finals · Luxury album</p><button className="btn-primary" style={{marginTop: '20px'}} onClick={() => scrollToSection('inquiry')}>Inquire</button></div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Inquiry Section */}
                    <div id="inquiry" className="section" style={{background: '#f5f5f5'}}>
                        <div className="container">
                            <h2 className="section-title">Send Us a Message</h2>
                            <p className="section-subtitle">We'd love to hear from you — inquiries, questions, or feedback</p>
                            <div className="inquiry-section">
                                <form className="inquiry-form" onSubmit={(e) => {
                                    e.preventDefault();
                                    const name = e.target.name.value;
                                    const email = e.target.email.value;
                                    const type = e.target.type.value;
                                    const message = e.target.message.value;
                                    addInquiry(name, email, type, message);
                                    e.target.reset();
                                }}>
                                    <div style={{display: 'flex', gap: '15px', flexWrap: 'wrap'}}>
                                        <input type="text" name="name" placeholder="Your name *" required style={{flex: 1}} />
                                        <input type="email" name="email" placeholder="Email address *" required style={{flex: 1}} />
                                    </div>
                                    <select name="type">
                                        <option value="Booking Inquiry">📷 Booking Inquiry</option>
                                        <option value="General Question">❓ General Question</option>
                                        <option value="Feedback">💬 Feedback</option>
                                    </select>
                                    <textarea name="message" rows="4" placeholder="Your message..." required></textarea>
                                    <button type="submit" className="btn-primary" style={{width: '100%'}}>Send Message</button>
                                </form>
                            </div>
                            
                            {/* Owner Inquiries Panel */}
                            {isOwner && (
                                <div id="owner-inquiries">
                                    <h3 style={{marginTop: '40px', fontSize: '1.8rem'}}><i className="fas fa-eye"></i> Private Inquiries ({inquiries.length})</h3>
                                    <div className="inquiry-list">
                                        {inquiries.length === 0 && <p>No inquiries yet.</p>}
                                        {inquiries.map(inq => (
                                            <div className="inquiry-card" key={inq.id}>
                                                <strong>{inq.name}</strong> ({inq.email}) - <em>{inq.type}</em>
                                                <small style={{display: 'block', color: '#888', marginBottom: '8px'}}>{inq.date}</small>
                                                <p>{inq.message}</p>
                                                <button onClick={() => deleteInquiry(inq.id)} style={{background: '#dc3545', color: 'white', border: 'none', padding: '5px 15px', borderRadius: '20px', cursor: 'pointer', marginTop: '8px'}}>Delete</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    {/* Footer */}
                    <footer>
                        <div className="container">
                            <h3 style={{color: '#c49a6c', marginBottom: '20px'}}>YASHGANGA PHOTOS</h3>
                            <p style={{marginBottom: '10px'}}>कन्या शाळेमागे,यशवंतराव विद्यालय Umbraj 415109  </p>
                            <p style={{marginBottom: '10px'}}>📞 9923329129 /8459380540 | ✉️ hello@yashgangastudio.com</p>
                            <p style={{marginTop: '30px', fontSize: '0.8rem'}}>© 2025 YASHGANGA Studio — Premium Photography. All rights reserved.</p>
                        </div>
                    </footer>
                    
                    {/* Login Modal */}
                    {showLoginModal && (
                        <div className="modal">
                            <div className="modal-content">
                                <i className="fas fa-crown" style={{fontSize: '2.5rem', color: '#c49a6c', marginBottom: '20px', display: 'block', textAlign: 'center'}}></i>
                                <h3 style={{textAlign: 'center', marginBottom: '20px'}}>Owner Access</h3>
                                <input type="password" id="ownerPass" placeholder="Enter password" style={{width: '100%', padding: '12px', marginBottom: '20px', borderRadius: '60px', border: '1px solid #ddd'}} />
                                <button className="btn-primary" style={{width: '100%'}} onClick={() => {
                                    const pwd = document.getElementById('ownerPass').value;
                                    handleLogin(pwd);
                                }}>Login</button>
                                <button className="btn-outline-light" style={{width: '100%', marginTop: '10px', background: '#ddd', color: '#333', border: 'none'}} onClick={() => setShowLoginModal(false)}>Cancel</button>
                                <p style={{textAlign: 'center', marginTop: '15px', fontSize: '0.8rem', color: '#666'}}>Demo password: <strong>studio123</strong></p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
